<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pecs2</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #ffffff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.85rem;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 3rem 3.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.03);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #58a6ff, #bc8cff, #ff7b72);
      border-radius: 16px 16px 0 0;
    }

    .project-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem auto;
      font-size: 1.8rem;
      box-shadow: 0 4px 16px rgba(56, 139, 253, 0.35);
    }

    .project-name {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #e6edf3;
      margin-bottom: 0.5rem;
      line-height: 1.1;
    }

    .project-name span {
      background: linear-gradient(135deg, #58a6ff, #bc8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, #58a6ff, #bc8cff);
      border-radius: 2px;
      margin: 1.25rem auto;
    }

    .repo-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8b949e;
      margin-bottom: 0.5rem;
    }

    .repo-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 0.6rem 1.2rem;
      color: #58a6ff;
      font-size: 1.05rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      cursor: pointer;
    }

    .repo-link:hover {
      background: #2d333b;
      border-color: #58a6ff;
      transform: translateY(-1px);
    }

    .repo-link svg {
      flex-shrink: 0;
    }

    .meta {
      margin-top: 1.75rem;
      display: flex;
      justify-content: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: #8b949e;
    }

    .meta-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #238636;
      box-shadow: 0 0 6px rgba(35, 134, 54, 0.7);
    }

    footer {
      margin-top: 2.5rem;
      text-align: center;
      color: #484f58;
      font-size: 0.82rem;
      letter-spacing: 0.02em;
      padding-bottom: 1rem;
    }

    footer strong {
      color: #8b949e;
      font-weight: 600;
    }

    footer .heart {
      color: #ff7b72;
    }
  </style>
</head>
<body>

  <div class="container">

    <span class="badge">&#9679; Active Project</span>

    <div class="card">

      <div class="project-icon">&#128204;</div>

      <h1 class="project-name"><span>pecs2</span></h1>

      <p style="color:#8b949e; font-size:0.95rem; margin-top:0.5rem; line-height:1.5;">
        A powerful, modern project built for performance and clarity.

      <div class="divider"></div>

      <p class="repo-label">Repository</p>

      <div class="meta">
        <span class="meta-item">

          Open Source
        </span>
        <span class="meta-item">

          </svg>
          v2.0

      </div>

    </div>

  </div>

  <footer>
    <span class="heart">&#9829;</span> Developed by <strong>Royal Bengal AI</strong>

</body>
</html>
